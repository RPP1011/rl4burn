# PPO CartPole training configuration

[training]
total_timesteps = 500_000
n_envs = 4
seed = 42

[ppo]
lr = 2.5e-4
gamma = 0.99
gae_lambda = 0.95
clip_eps = 0.2
vf_coef = 0.5
ent_coef = 0.01
update_epochs = 4
minibatch_size = 128
n_steps = 128
clip_vloss = true
max_grad_norm = 0.5

[model]
hidden_size = 64
