[package]
name = "rl4burn"
version = "0.1.0"
edition = "2021"
description = "Reinforcement learning algorithms for the Burn ML framework"
license = "MIT OR Apache-2.0"

[dependencies]
burn = { version = "0.20", default-features = false, features = ["std"] }
contracts = "0.6"
rand = "0.9"
rand_distr = "0.5"

[dev-dependencies]
burn = { version = "0.20", default-features = false, features = ["std", "ndarray", "autodiff"] }

[features]
default = []
ndarray = ["burn/ndarray"]
